name: Scrape Cinema Timetables
on:
  workflow_dispatch: # Triggered externally via cron-job.org
permissions:
  contents: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt
      - name: Install dependencies
        run: pip install -r scraper/requirements.txt
      # ── All scrapers temporarily skipped for enrichment-only test ──
      - name: Enrich with Letterboxd ratings
        run: python scraper/enrich_letterboxd.py -d ./public/data
      - name: Check for changes
        id: changes
        run: |
          git add public/data/films.json public/data/films_pcc.json public/data/films_castle.json public/data/films_arzner.json public/data/films_bfi.json public/data/films_electric_portobello.json public/data/films_electric_white_city.json public/data/films_closeup.json public/data/films_ica.json public/data/films_garden.json
          git diff --cached --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Cinema Scraper Bot"
          git config user.email "actions@github.com"
          git commit -m "chore: update timetable data ($(date -u '+%Y-%m-%d %H:%M UTC'))"
          git push

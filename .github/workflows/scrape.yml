name: Scrape Cinema Timetables

on:
  workflow_dispatch: # Triggered externally via cron-job.org

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run Peckhamplex scraper
        run: python scraper/scrape.py

      - name: Run Prince Charles Cinema scraper
        run: python scraper/scrape_prince_charles.py

      - name: Run Castle Cinema scraper
        run: python scraper/scrape_castle.py

      - name: Run The Arzner scraper
        run: python scraper/scrape_arzner.py

      - name: Run BFI Southbank scraper
        run: python scraper/scrape_bfi.py
        continue-on-error: true  # BFI has aggressive Cloudflare; don't block other cinemas

      - name: Run Electric Cinema scraper
        run: python scraper/scrape_electric.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet public/data/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Cinema Scraper Bot"
          git config user.email "actions@github.com"
          git add public/data/films.json public/data/films_pcc.json public/data/films_castle.json public/data/films_arzner.json public/data/films_bfi.json public/data/films_electric_portobello.json public/data/films_electric_white_city.json
          git commit -m "chore: update timetable data ($(date -u '+%Y-%m-%d %H:%M UTC'))"
          git push

name: Scrape Peckhamplex Timetable

on:
  schedule:
    # Run at 10:00 and 16:00 UTC every day
    - cron: "0 10 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run scraper
        run: python scraper/scrape.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet public/data/films.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Peckhamplex Scraper Bot"
          git config user.email "actions@github.com"
          git add public/data/films.json
          git commit -m "chore: update timetable data ($(date -u '+%Y-%m-%d %H:%M UTC'))"
          git push
